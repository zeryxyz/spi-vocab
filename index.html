<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPI語彙トレーナー</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--accent:#38bdf8;--accent2:#22c55e;--danger:#f87171;--text:#e2e8f0;--sub:#94a3b8;--line:#475569;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:16px;max-width:680px;margin:0 auto;}
  h1{font-size:1.3rem;margin:8px 0 4px;text-align:center;}
  .sub{text-align:center;color:var(--sub);font-size:.85rem;margin-bottom:16px;}
  .modes{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;}
  .modes button{flex:1;min-width:90px;padding:10px 8px;border:none;border-radius:10px;background:var(--card2);color:var(--text);font-size:.9rem;cursor:pointer;transition:.15s;}
  .modes button.active{background:var(--accent);color:#0f172a;font-weight:700;}
  .ranges{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;justify-content:center;align-items:center;}
  .ranges .rlabel{font-size:.8rem;color:var(--sub);margin-right:2px;}
  .ranges button{padding:6px 14px;border:1px solid var(--line);border-radius:99px;background:transparent;color:var(--sub);font-size:.85rem;cursor:pointer;transition:.15s;}
  .ranges button.on{background:var(--accent);color:#0f172a;border-color:var(--accent);font-weight:700;}
  .bar{height:8px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:6px;}
  .bar>div{height:100%;background:var(--accent2);width:0;transition:.3s;}
  .stat{display:flex;justify-content:space-between;font-size:.8rem;color:var(--sub);margin-bottom:16px;}
  .card{background:var(--card);border-radius:16px;padding:28px 20px;min-height:230px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.3);}
  .label{font-size:.75rem;color:var(--sub);letter-spacing:.1em;margin-bottom:10px;}
  .meaning{font-size:1.25rem;font-weight:600;margin-bottom:8px;}
  .usage{font-size:.85rem;color:var(--sub);margin-bottom:18px;}
  .answer{font-size:2rem;font-weight:800;color:var(--accent);margin:6px 0;}
  .reading{font-size:1rem;color:var(--accent2);margin-bottom:10px;}
  .hint{font-size:.85rem;color:var(--sub);background:var(--card2);padding:10px 14px;border-radius:10px;margin-top:6px;max-width:100%;}
  .btns{display:flex;gap:10px;margin-top:18px;width:100%;}
  .btns button{flex:1;padding:14px;border:none;border-radius:12px;font-size:1rem;cursor:pointer;font-weight:700;transition:.15s;}
  .show{background:var(--accent);color:#0f172a;}
  .ng{background:var(--danger);color:#0f172a;}
  .ok{background:var(--accent2);color:#0f172a;}
  .choices{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:18px;}
  .choices button{padding:14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--text);font-size:1.05rem;cursor:pointer;transition:.15s;text-align:center;}
  .choices button.correct{background:var(--accent2);color:#0f172a;border-color:var(--accent2);}
  .choices button.wrong{background:var(--danger);color:#0f172a;border-color:var(--danger);}
  .choices button:disabled{cursor:default;opacity:.85;}
  .next{margin-top:16px;width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#0f172a;font-weight:700;font-size:1rem;cursor:pointer;}
  .foot{display:flex;gap:8px;margin-top:14px;}
  .foot button{flex:1;padding:8px;border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--sub);font-size:.8rem;cursor:pointer;}
  .done{text-align:center;padding:40px 20px;}
  .done .big{font-size:3rem;}
  .empty{text-align:center;padding:40px 20px;color:var(--sub);}
</style>
</head>
<body>
  <h1>SPI語彙トレーナー</h1>
  <div class="sub" id="sub">データ未登録</div>
  <div class="modes">
    <button data-mode="card" class="active">暗記カード</button>
    <button data-mode="quiz">4択クイズ</button>
    <button data-mode="weak">苦手のみ</button>
  </div>
  <div class="ranges" id="ranges"><span class="rlabel">範囲</span></div>
  <div class="bar"><div id="progbar"></div></div>
  <div class="stat"><span id="counter">0 / 0</span><span id="weakcount">苦手 0語</span></div>
  <div id="stage"></div>
  <div class="foot">
    <button id="shuffleBtn">シャッフルして最初から</button>
    <button id="resetWeak">苦手リセット</button>
  </div>

const PAGES=[...new Set(WORDS.map(w=>w.p))].sort((a,b)=>a-b);
const LS_WEAK="spi_weak_v3",LS_PAGES="spi_pages_v3";
let mode="card",order=[],idx=0,quizAnswered=false;
function loadWeak(){try{return new Set(JSON.parse(localStorage.getItem(LS_WEAK)||"[]"));}catch(e){return new Set();}}
function saveWeak(s){localStorage.setItem(LS_WEAK,JSON.stringify([...s]));}
let weak=loadWeak();
function loadPages(){try{const a=JSON.parse(localStorage.getItem(LS_PAGES));return a&&a.length?new Set(a):new Set(PAGES);}catch(e){return new Set(PAGES);}}
function savePages(s){localStorage.setItem(LS_PAGES,JSON.stringify([...s]));}
let selPages=loadPages();
selPages=new Set([...selPages].filter(p=>PAGES.includes(p)));
if(selPages.size===0)selPages=new Set(PAGES);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildOrder(){
  if(mode==="weak"){order=WORDS.map((w,i)=>i).filter(i=>weak.has(WORDS[i].t));}
  else{order=WORDS.map((w,i)=>i).filter(i=>selPages.has(WORDS[i].p));}
  shuffle(order);idx=0;
}
function renderRanges(){
  const box=document.getElementById("ranges");
  box.innerHTML='<span class="rlabel">範囲</span>';
  if(PAGES.length===0)return;
  const allBtn=document.createElement("button");
  allBtn.textContent="全て";allBtn.className=(selPages.size===PAGES.length)?"on":"";
  allBtn.onclick=()=>{selPages=new Set(PAGES);savePages(selPages);renderRanges();buildOrder();render();};
  box.appendChild(allBtn);
  PAGES.forEach(p=>{
    const b=document.createElement("button");
    const n=WORDS.filter(w=>w.p===p).length;
    b.textContent=`p${p}(${n})`;b.className=selPages.has(p)?"on":"";
    b.onclick=()=>{if(selPages.has(p))selPages.delete(p);else selPages.add(p);if(selPages.size===0)selPages.add(p);savePages(selPages);renderRanges();buildOrder();render();};
    box.appendChild(b);
  });
}
function setMode(m){mode=m;document.querySelectorAll(".modes button").forEach(b=>b.classList.toggle("active",b.dataset.mode===m));buildOrder();render();}
function updateStat(){
  const total=order.length;
  document.getElementById("counter").textContent=total?`${Math.min(idx+1,total)} / ${total}`:"0 / 0";
  document.getElementById("progbar").style.width=total?`${(idx/total)*100}%`:"0%";
  document.getElementById("weakcount").textContent=`苦手 ${weak.size}語`;
}
function markWeak(t,on){if(on)weak.add(t);else weak.delete(t);saveWeak(weak);}
function render(){
  updateStat();
  const stage=document.getElementById("stage");
  if(WORDS.length===0){stage.innerHTML=`<div class="card empty">語句がありません</div>`;return;}
  if(order.length===0){stage.innerHTML=`<div class="card empty"><div class="meaning">${mode==="weak"?"苦手リストは空です🎉":"この範囲に語句がありません"}</div></div>`;return;}
  if(idx>=order.length){stage.innerHTML=`<div class="card done"><div class="big">🎉</div><div class="meaning">${order.length}語 一周しました</div><div class="usage">下のボタンでもう一周 / 苦手のみ復習</div></div>`;document.getElementById("progbar").style.width="100%";return;}
  const w=WORDS[order[idx]];
  if(mode==="quiz")renderQuiz(w);else renderCard(w);
}
function renderCard(w){
  const stage=document.getElementById("stage");
  stage.innerHTML=`<div class="card"><div class="label">この意味の語句は？</div><div class="meaning">${w.m}</div><div class="usage">用例：${w.u?w.u.split(w.t).join("〇〇"):"—"}</div><div id="ansArea" style="display:none"><div class="answer">${w.t}</div><div class="reading">${w.r||""}</div>${w.u?`<div class="usage" style="margin-top:6px">用例：${w.u}</div>`:""}${w.h?`<div class="hint">💡 ${w.h}</div>`:""}</div><div class="btns" id="cardBtns"><button class="show" id="showBtn">答えを見る</button></div></div>`;
  document.getElementById("showBtn").onclick=()=>{
    document.getElementById("ansArea").style.display="block";
    document.getElementById("cardBtns").innerHTML=`<button class="ng" id="ngBtn">できなかった</button><button class="ok" id="okBtn">できた</button>`;
    document.getElementById("ngBtn").onclick=()=>{markWeak(w.t,true);idx++;render();};
    document.getElementById("okBtn").onclick=()=>{markWeak(w.t,false);idx++;render();};
  };
}
function renderQuiz(w){
  quizAnswered=false;
  const pool=WORDS.filter(x=>x.t!==w.t);shuffle(pool);
  const opts=shuffle([w,pool[0],pool[1],pool[2]].filter(Boolean));
  const stage=document.getElementById("stage");
  stage.innerHTML=`<div class="card"><div class="label">この意味の語句は？</div><div class="meaning">${w.m}</div><div class="usage">用例：${w.u?w.u.split(w.t).join("〇〇"):"—"}</div><div class="choices" id="choices"></div><div id="qextra"></div></div>`;
  const cont=document.getElementById("choices");
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.textContent=`${o.t}${o.r?`（${o.r}）`:""}`;
    b.onclick=()=>{
      if(quizAnswered)return;quizAnswered=true;
      const all=cont.querySelectorAll("button");all.forEach(x=>x.disabled=true);
      if(o.t===w.t){b.classList.add("correct");markWeak(w.t,false);}
      else{b.classList.add("wrong");markWeak(w.t,true);all.forEach(x=>{if(x.textContent.startsWith(w.t+"（")||x.textContent===w.t)x.classList.add("correct");});}
      document.getElementById("qextra").innerHTML=`${w.h?`<div class="hint">💡 ${w.h}</div>`:""}<button class="next" id="nextBtn">次へ</button>`;
      document.getElementById("nextBtn").onclick=()=>{idx++;render();};
    };
    cont.appendChild(b);
  });
}
document.querySelectorAll(".modes button").forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
document.getElementById("shuffleBtn").onclick=()=>{buildOrder();render();};
document.getElementById("resetWeak").onclick=()=>{if(confirm("苦手リストを空にしますか？")){weak.clear();saveWeak(weak);if(mode==="weak")buildOrder();render();}};
document.getElementById("sub").textContent=WORDS.length?`頻出語句 全${WORDS.length}語（p${PAGES[0]}–${PAGES[PAGES.length-1]}）`:"データ未登録";
renderRanges();buildOrder();render();
</script>
